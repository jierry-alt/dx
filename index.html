<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternity - 永恒连接</title>
    
    <!-- 稳定 Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            overflow: hidden;
        }

        /* 炫酷紫色星空背景 */
        .star-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(135deg, #2a1b4a, #4c1d95, #7e22ce, #c026d3);
            background-size: 400% 400%;
            animation: nebula 35s ease infinite;
        }

        @keyframes nebula {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 闪烁星星 */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #e0bbff;
            animation: twinkle 4s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 跑马灯 */
        .marquee {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            overflow: hidden;
            background: rgba(30, 10, 60, 0.85);
            backdrop-filter: blur(12px);
        }

        .marquee-content {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 28s linear infinite;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #e0bbff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #c4b5fd, #e0bbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white font-sans">

    <!-- 紫色星空背景 -->
    <div class="star-bg"></div>
    <div class="stars" id="stars"></div>

    <!-- 跑马灯 -->
    <div class="marquee py-2">
        <div class="marquee-content">
            🔥 致敬裤佬！翻墙违法 白嫖无罪 🔥&nbsp;&nbsp;&nbsp;&nbsp;
            致敬裤佬！翻墙违法 白嫖无罪 &nbsp;&nbsp;&nbsp;&nbsp;
        </div>
    </div>

    <!-- 音乐按钮 -->
    <button onclick="toggleMusic()" id="music-btn"
            class="fixed top-6 left-6 z-50 w-12 h-12 rounded-2xl bg-white/10 border border-white/30 flex items-center justify-center active:scale-95 transition-all">
        <i class="fas fa-music text-violet-300 text-2xl"></i>
    </button>
