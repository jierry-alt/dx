<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternity - 永恒连接</title>
    
    <!-- 使用最稳定的 Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {}
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #2a1b4a, #4c1d95, #7e22ce);
            min-height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px #e0bbff;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        .gradient-text {
            background: linear-gradient(to right, #c4b5fd, #f0abfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center text-white">

    <!-- 星星背景 -->
    <div id="stars" class="absolute inset-0 pointer-events-none"></div>

    <!-- 音乐按钮 -->
    <button onclick="toggleMusic()" id="music-btn"
            class="fixed top-6 left-6 z-50 w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 active:scale-95">
        <i class="fas fa-music text-3xl text-violet-200"></i>
    </button>

    <div class="relative z-10 w-full max-w-[360px] px-6 text-center">
        <div class="mb-12 mt-8">
            <div class="mx-auto w-20 h-20 bg-white/10 backdrop-blur rounded-3xl flex items-center justify-center mb-6">
                <i class="fab fa-telegram-plane text-6xl text-violet-300"></i>
            </div>
            <h1 class="text-5xl font-black tracking-tighter gradient-text">Eternity</h1>
            <p class="text-violet-200 mt-2 text-lg">永恒连接</p>
        </div>

        <!-- 主卡片 -->
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 border border-white/20 mb-8">
            <div class="flex justify-between mb-6">
                <div class="text-left">
                    <p class="text-xs tracking-widest text-violet-300">STATUS</p>
                    <p class="text-emerald-400 font-semibold flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-400 rounded-full animate-ping"></span>
                        在线
                    </p>
                </div>
                <div class="text-right">
                    <p class="text-xs tracking-widest text-violet-300">PROTOCOL</p>
                    <p class="font-bold text-lg">SOCKS5</p>
                </div>
            </div>

            <div onclick="copyConfig()" class="bg-white/10 hover:bg-white/20 rounded-2xl p-6 mb-6 cursor-pointer active:scale-95 transition-all">
                <p class="text-sm text-violet-200 mb-1">节点地址</p>
                <p class="font-mono text-2xl">143.14.105.121:5555</p>
            </div>

            <a href="tg://socks?server=143.14.105.121&port=5555&user=hanbaocloud&pass=hanbaocloud"
               class="block bg-gradient-to-r from-violet-600 to-purple-600 py-6 rounded-2xl font-bold text-2xl active:scale-95 transition-all">
                一键连接 Eternity
            </a>
        </div>

        <!-- 底部两个按钮 -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="playSong()" 
                    class="bg-white/10 hover:bg-white/20 py-5 rounded-2xl font-medium active:scale-95 transition-all">
                那些花儿
            </button>
            <a href="https://zxsla.github.io/a/" target="_blank"
               class="bg-white/10 hover:bg-white/20 py-5 rounded-2xl font-medium active:scale-95 transition-all">
                个人导航
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/70 backdrop-blur px-8 py-4 rounded-2xl text-sm">
        配置已复制到剪贴板
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/udaz0l.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 生成星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 4 + 2) + 's';
                container.appendChild(star);
            }
        }

        function copyConfig() {
            navigator.clipboard.writeText("tg://socks?server=143.14.105.121&port=5555&user=hanbaocloud&pass=hanbaocloud");
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        let musicPlaying = false;
        const music = document.getElementById('bg-music');

        function toggleMusic() {
            musicPlaying = !musicPlaying;
            if (musicPlaying) {
                music.play().catch(() => {});
                document.getElementById('music-btn').innerHTML = '<i class="fas fa-pause text-3xl text-violet-200"></i>';
            } else {
                music.pause();
                document.getElementById('music-btn').innerHTML = '<i class="fas fa-music text-3xl text-violet-200"></i>';
            }
        }

        function playSong() {
            window.open('https://www.youtube.com/watch?v=149r0W_ah9s', '_blank');
        }

        // 初始化
        window.onload = () => {
            createStars();
            music.volume = 0.4;
        };
    </script>
</body>
</html>
