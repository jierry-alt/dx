<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity - 永恒连接</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eternity: '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --transition-speed: 0.5s;
        }

        body {
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            overflow: hidden;
        }

        /* 炫酷春雨绿色背景 */
        .rain-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #052e16, #166534, #4ade80, #86efac, #22c55e);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 春雨粒子效果 - 绿色光晕 */
        .rain {
            position: absolute;
            inset: 0;
            background: transparent;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            width: 2.5px;
            height: 65px;
            background: linear-gradient(transparent, rgba(163, 230, 187, 0.95));
            box-shadow: 0 0 8px #4ade80, 0 0 15px #22c55e;
            animation: fall linear infinite;
            opacity: 0.85;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* 跑马灯 */
        .marquee {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-bottom: 3px solid rgba(163, 230, 187, 0.4);
        }
