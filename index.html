<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity - 永恒连接</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
            background: #000;
        }

        /* 炫酷星空背景 */
        .star-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 30% 20%, rgba(120, 80, 200, 0.25), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(80, 180, 255, 0.2), transparent 60%),
                        #0a0a1f;
            animation: nebulaFlow 40s linear infinite;
        }

        @keyframes nebulaFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 多层闪烁星星 */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px #a5b4fc;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 跑马灯 */
        .marquee {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            overflow: hidden;
            background: rgba(0, 0, 20, 0.75);
            backdrop-filter: blur(10px);
        }

        .marquee-content {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 26s linear infinite;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #c4d0ff, #a5b4fc, #c4d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
