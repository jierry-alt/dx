<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternity - 永恒连接</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2a1b4a, #4c1d95, #7e22ce, #c026d3);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-y: auto;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #f0abfc; animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.4; } to { opacity: 1; } }

        .marquee {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(30,15,60,0.85); padding: 6px 0; overflow: hidden; font-size: 13px;
        }
        .marquee-content {
            display: inline-block; animation: marquee 22s linear infinite;
            font-weight: 700; letter-spacing: 2px; color: #e0bbff;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { position: relative; z-index: 10; max-width: 360px; margin: 80px auto 30px; padding: 0 16px; text-align: center; }

        .title { font-size: 30px; font-weight: 900; background: linear-gradient(to right, #c4b5fd, #f0abfc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0 6px; }
        .subtitle { font-size: 15px; color: #d8b4fe; }

        .glass {
            background: rgba(255,255,255,0.14); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.22); border-radius: 20px;
            padding: 18px; margin: 18px 0;
        }

        .node-item {
            background: rgba(255,255,255,0.12); padding: 14px; border-radius: 14px;
            margin: 12px 0; font-size: 17px; font-family: monospace; cursor: pointer;
            transition: all 0.2s;
        }
        .node-item:active { transform: scale(0.97); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <!-- 跑马灯 -->
    <div class="marquee">
        <div class="marquee-content">
            🔥 致敬裤佬！翻墙违法 白嫖无罪 🔥&nbsp;&nbsp;&nbsp;&nbsp;
             &nbsp;&nbsp;&nbsp;&nbsp;
        </div>
    </div>

    <!-- 音乐按钮 -->
    <button onclick="toggleMusic()" id="music-btn"
            style="position: fixed; top: 12px; left: 12px; z-index: 100; width: 46px; height: 46px; background: rgba(255,255,255,0.15); border: none; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 23px;">
        <i class="fas fa-music"></i>
    </button>

    <div class="container">
        <div style="margin-bottom: 20px;">
            <div style="width: 58px; height: 58px; background: rgba(255,255,255,0.15); border-radius: 18px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;">
                <i class="fab fa-telegram-plane" style="font-size: 34px; color: #c4b5fd;"></i>
            </div>
            <h1 class="title">Eternity</h1>
            <p class="subtitle">永恒连接</p>
        </div>

        <div class="glass">
            <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 13px;">
                <div><div style="color:#c4b5fe;">STATUS</div><div style="color:#4ade80; font-weight:bold;">● 在线</div></div>
                <div style="text-align:right;"><div style="color:#c4b5fe;">PROTOCOL</div><div style="font-weight:bold;">SOCKS5</div></div>
            </div>

            <!-- 多个节点列表（在这里添加新节点） -->
            <div id="node-list">
                <!-- 默认第一个节点 -->
                <div class="node-item" onclick="connectProxy(0)">
                    <div style="font-size:13px; color:#d8b4fe;">节点 1</div>
                    <div>143.14.105.121:5555</div>
                </div>
            </div>

            <a href="#" id="connect-btn" onclick="connectCurrent()" 
               style="display:block; background:linear-gradient(to right,#7e22ce,#c026d3); padding:15px; border-radius:16px; font-size:17.5px; font-weight:bold; margin:16px 0; color:white; text-decoration:none;">
                一键连接当前节点
            </a>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="playSong()" class="btn-secondary" style="background:rgba(255,255,255,0.16); padding:13px; border-radius:14px; font-size:15.5px;">那些花儿</button>
            <a href="https://zxsla.github.io/a/" target="_blank" class="btn-secondary" style="background:rgba(255,255,255,0.16); padding:13px; border-radius:14px; font-size:15.5px; text-align:center; text-decoration:none; color:white;">个人导航</a>
        </div>
    </div>

    <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:12px 22px; border-radius:9999px; font-size:14px; display:none; z-index:200;">
        配置已复制
    </div>

    <audio id="bg-music" loop><source src="https://files.catbox.moe/udaz0l.mp3" type="audio/mpeg"></audio>

    <script>
        // ==================== 添加新节点在这里 ====================
        let proxies = [
            {
                name: "节点 1",
                server: "143.14.105.121",
                port: "5555",
                user: "hanbaocloud",
                pass: "hanbaocloud"
            }
            // 在这里继续添加新节点，例如：
            // ,
            // {
            //     name: "节点 2",
            //     server: "你的第二个IP",
            //     port: "5555",
            //     user: "你的用户名",
            //     pass: "你的密码"
            // }
        ];

        let currentIndex = 0;

        function renderNodes() {
            const list = document.getElementById('node-list');
            list.innerHTML = '';
            proxies.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'node-item';
                div.innerHTML = `
                    <div style="font-size:13px; color:#d8b4fe;">${p.name}</div>
                    <div>${p.server}:${p.port}</div>
                `;
                div.onclick = () => connectProxy(i);
                list.appendChild(div);
            });
        }

        function connectProxy(index) {
            currentIndex = index;
            const p = proxies[index];
            const tgLink = `tg://socks?server=${p.server}&port=${p.port}&user=${p.user}&pass=${p.pass}`;
            document.getElementById('connect-btn').href = tgLink;
            copyConfig(p);
        }

        function connectCurrent() {
            if (proxies[currentIndex]) connectProxy(currentIndex);
        }

        function copyConfig(p) {
            const config = `tg://socks?server=${p.server}&port=${p.port}&user=${p.user}&pass=${p.pass}`;
            navigator.clipboard.writeText(config).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }

        // 其他功能保持不变
        let isPlaying = false;
        const music = document.getElementById('bg-music');
        function toggleMusic() {
            isPlaying = !isPlaying;
            if (isPlaying) music.play().catch(() => {});
            document.getElementById('music-btn').innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-music"></i>';
        }

        function playSong() {
            window.open('https://www.youtube.com/watch?v=149r0W_ah9s', '_blank');
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 4 + 2) + 's';
                container.appendChild(star);
            }
        }

        window.onload = () => {
            createStars();
            renderNodes();
            music.volume = 0.4;
            // 默认选中第一个
            connectProxy(0);
        };
    </script>
</body>
</html>
