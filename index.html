<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>免费TG代理 - 极致连接体验</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2a1b4a, #4c1d95, #7e22ce, #c026d3);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-y: auto;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #f0abfc; animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.4; } to { opacity: 1; } }

        /* 小跑马灯 */
        .marquee {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(30,15,60,0.9); padding: 7px 0; overflow: hidden; font-size: 13.5px;
        }
        .marquee-content {
            display: inline-block; animation: marquee 24s linear infinite;
            font-weight: 700; letter-spacing: 2px; color: #e0bbff;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { position: relative; z-index: 10; max-width: 380px; margin: 85px auto 30px; padding: 0 20px; text-align: center; }

        .main-title { font-size: 28px; font-weight: 900; line-height: 1.1; margin: 8px 0 4px; }
        .subtitle { font-size: 13px; letter-spacing: 3px; color: #a5b4fc; opacity: 0.9; }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 24px;
            padding: 22px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .status-row { display: flex; justify-content: space-between; margin-bottom: 18px; font-size: 14px; }
        .node-box {
            background: rgba(0,0,0,0.4); padding: 16px; border-radius: 16px;
            margin: 16px 0; position: relative; cursor: pointer;
        }
        .copy-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; opacity: 0.7; }

        .btn-primary {
            background: linear-gradient(to right, #0ea5e9, #3b82f6);
            padding: 17px; border-radius: 18px; font-size: 18px; font-weight: bold;
            margin: 18px 0; display: block; color: white; text-decoration: none;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .info-row {
            display: flex; justify-content: space-between; font-size: 13px; margin-top: 18px; padding-top: 14px;
            border-top: 1px solid rgba(148,163,184,0.2);
        }
    </style>
</head>
<body>

    </div>
