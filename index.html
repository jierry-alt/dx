<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternity - 永恒连接</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2a1b4a, #4c1d95, #7e22ce, #c026d3);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-y: auto;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #f0abfc; animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.4; } to { opacity: 1; } }

        .marquee {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50;
            background: rgba(30,15,60,0.9); padding: 7px 0; overflow: hidden; font-size: 13.5px;
        }
        .marquee-content {
            display: inline-block; animation: marquee 24s linear infinite;
            font-weight: 700; letter-spacing: 2px; color: #e0bbff;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { 
            position: relative; z-index: 10; 
            max-width: 380px; margin: 90px auto 40px; 
            padding: 0 20px; text-align: center; 
        }

        .title { font-size: 32px; font-weight: 900; background: linear-gradient(to right, #c4b5fd, #f0abfc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0 6px; }
        .subtitle { font-size: 15px; color: #d8b4fe; }

        .glass {
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .node-box {
            background: rgba(255,255,255,0.12);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            font-size: 18px;
            font-family: monospace;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(to right, #7e22ce, #c026d3);
            padding: 16px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            margin: 16px 0;
            display: block;
            color: white;
            text-decoration: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.16);
            padding: 15px;
            border-radius: 16px;
            font-size: 16px;
        }
    </style>
</head>
